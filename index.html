<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
viewport-fit=cover,
user-scalable=no">

<title>みえるスケジュール</title>

<meta name="theme-color"
content="#4CAF50">

<link rel="manifest"
href="manifest.json">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<h1>
みえるスケジュール
</h1>

<button
id="settingsBtn"
aria-label="設定">
⚙️ </button>

</header>

<main>

<!-- =====================
児童画面
===================== -->

<section id="studentView">

<div class="now-next">

<div class="panel">

<h2>
いま
</h2>

<div class="card">

<img
id="currentImage"
src=""
alt="現在の活動">

<p id="currentTitle">
カードなし
</p>

</div>

</div>

<div class="panel">

<h2>
つぎ
</h2>

<div class="card">

<img
id="nextImage"
src=""
alt="次の活動">

<p id="nextTitle">
-
</p>

</div>

</div>

</div>

<section id="timerSection">

<div id="timerBar">

<div id="timerProgress">
</div>

</div>

<div id="timerText">
00:00
</div>

</section>

<div id="controls">

<button id="startBtn">
▶ スタート
</button>

<button id="pauseBtn">
⏸ とめる
</button>

<button id="nextBtn">
➡ つぎへ
</button>

</div>

</section>

<!-- =====================
教員モード
===================== -->

<section id="teacherView">

<h2>
せんせいモード
</h2>

<div class="teacherCard">

<label for="cardName">
カード名
</label>

<input
type="text"
id="cardName"
placeholder="例：トイレ">

</div>

<div class="teacherCard">

<label for="cardTime">
時間（分）
</label>

<input
type="number"
id="cardTime"
min="1"
max="120"
value="5">

</div>

<div class="teacherCard">

<label for="imageInput">
画像
</label>

<input
type="file"
id="imageInput"
accept="image/*">

</div>

<button id="addCardBtn">
カード追加
</button>

<hr>

<h3>
登録済みカード
</h3>

<p class="help">

ドラッグで順番変更

</p>

<ul id="scheduleList">
</ul>

<div class="teacherButtons">

<button id="resetBtn">
全削除
</button>

<button id="loadSampleBtn">
初期カード作成
</button>

</div>

</section>

</main>

<!-- =====================
パスコード画面
===================== -->

<div id="passwordModal">

<div id="passwordBox">

<h2>
せんせいモード
</h2>

<p>
4けたのパスコード
</p>

<input
type="password"
inputmode="numeric"
maxlength="4"
id="passwordInput">

<div class="passwordButtons">

<button id="passwordOkBtn">
OK
</button>

<button id="passwordCancelBtn">
キャンセル
</button>

</div>

</div>

</div>

<!-- =====================
ライブラリ
===================== -->

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<!-- =====================
アプリ
===================== -->

<script src="app.js"></script>

</body>

</html>

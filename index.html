<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
user-scalable=no">

<title>みえるスケジュール</title>

<link rel="manifest"
href="manifest.json">

<link rel="stylesheet"
href="style.css">

<meta name="theme-color"
content="#4CAF50">

</head>

<body>

<header>

<h1>
みえるスケジュール
</h1>

<button id="settingsBtn">
⚙️
</button>

</header>

<main>

<section id="studentView">

<div class="now-next">

<div class="panel">

<h2>
いま
</h2>

<div class="card">

<img
id="currentImage"
alt="現在">

<p id="currentTitle">
活動
</p>

</div>

</div>

<div class="panel">

<h2>
つぎ
</h2>

<div class="card">

<img
id="nextImage"
alt="次">

<p id="nextTitle">
つぎ
</p>

</div>

</div>

</div>

<section id="timerSection">

<div id="timerBar">

<div id="timerProgress">
</div>

</div>

<div id="timerText">
00:00
</div>

</section>

<div id="controls">

<button id="startBtn">
スタート
</button>

<button id="pauseBtn">
いったんとめる
</button>

<button id="nextBtn">
つぎへ
</button>

</div>

</section>

<section id="teacherView">

<h2>
せんせいモード
</h2>

<div class="teacherCard">

<label>
カード名
</label>

<input
type="text"
id="cardName">

</div>

<div class="teacherCard">

<label>
時間（分）
</label>

<input
type="number"
id="cardTime"
value="5">

</div>

<div class="teacherCard">

<label>
画像
</label>

<input
type="file"
id="imageInput"
accept="image/*">

</div>

<button id="addCardBtn">
カード登録
</button>

<h3>
スケジュール
</h3>

<ul id="scheduleList">
</ul>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<script src="app.js"></script>

</body>

</html>
